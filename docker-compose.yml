services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: proteus
      POSTGRES_PASSWORD: proteus_password
      POSTGRES_DB: proteus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for Job Queue
  redis:
    image: redis:7-alpine
    restart: always

  # Main Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    environment:
      - DATABASE_URL=postgresql://proteus:proteus_password@db:5432/proteus_db
      - REDIS_URL=redis://redis:6379/0
      - PORT=80
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
